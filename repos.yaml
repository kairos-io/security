# Authoritative, manually-maintained list of repositories to track.
#
# This is the SOURCE OF TRUTH. `ksec discover` reads ONLY this file — it does
# NOT auto-enumerate the GitHub org. Add or remove repos here by hand.
#
# To capture the current org once as a starting point to curate from, run:
#   ksec discover --seed-from kairos-io     # prints a repos: block to stdout
#
# Fields:
#   repo        owner/name (required)
#   kind        org | external          (defaults: kairos-io/* -> org, else external)
#   criticality low | medium | high     (default: medium)
#   branch      optional (informational; clones use the repo's default branch)
#   artifacts   optional, only for container images, e.g.:
#                 artifacts: [{type: image, ref: quay.io/kairos/foo:v1}]
# Go source CVEs (govulncheck) are scanned automatically for any repo that has
# a root go.mod, so Go repos do not need an explicit artifact.
repos:
  # --- kairos-io maintained components ---
  - repo: kairos-io/kairos
    kind: org
    criticality: high
  - repo: kairos-io/kairos-init
    kind: org
    criticality: high
  - repo: kairos-io/kairos-agent
    kind: org
    criticality: high
  - repo: kairos-io/immucore
    kind: org
    criticality: high
  - repo: kairos-io/kcrypt-discovery-challenger
    kind: org
    criticality: medium
  - repo: kairos-io/provider-kairos
    kind: org
    criticality: medium
  - repo: kairos-io/kairos-sdk
    kind: org
    criticality: medium
  - repo: kairos-io/AuroraBoot
    kind: org
    criticality: high
  - repo: kairos-io/kairos-operator
    kind: org
    criticality: high
  - repo: kairos-io/kairos-installer
    kind: org
    criticality: high
  - repo: kairos-io/kcrypt
    kind: org
    criticality: high
  - repo: kairos-io/tpm-helpers
    kind: org
    criticality: high
  - repo: kairos-io/cluster-api-provider-kairos
    kind: org
    criticality: medium
  - repo: kairos-io/provider-kubernetes
    kind: org
    criticality: medium
  - repo: kairos-io/netboot
    kind: org
    criticality: medium
  - repo: kairos-io/go-ukify
    kind: org
    criticality: medium
  - repo: kairos-io/go-nodepair
    kind: org
    criticality: medium
  - repo: kairos-io/entangle
    kind: org
    criticality: medium
  - repo: kairos-io/entangle-proxy
    kind: org
    criticality: medium
  - repo: kairos-io/simple-mdns-server
    kind: org
    criticality: low
  - repo: kairos-io/kairos-must-burn
    kind: org
    criticality: low
  - repo: kairos-io/kairos-lab
    kind: org
    criticality: low

  # --- OS image (trivy-scanned against published images, NOT govulncheck) ---
  # hadron is an OS, not a Go app, so source/govulncheck reachability is the
  # wrong lens. CVE tracking for an OS = trivy scanning its published OCI
  # image(s), surfacing OS-package (apk/deb/rpm), kernel, and baked-in lang-dep
  # CVEs with real severities. We scan one representative image on the moving
  # `main` tag (the repo's "main baseline", rebuilt continuously) so new OS/
  # kernel CVEs surface even without a hadron release. Flavor variants also
  # exist (ghcr.io/kairos-io/hadron-cloud, -trusted, -cloud-trusted) — add them
  # here if fuller coverage is wanted.
  - repo: kairos-io/hadron
    kind: org
    criticality: high
    artifacts:
      - {type: image, ref: ghcr.io/kairos-io/hadron:main}

  # --- external dependencies ---
  - repo: mudler/edgevpn
    kind: external
    criticality: high
  - repo: mudler/yip
    kind: external
    criticality: medium
  - repo: mudler/entities
    kind: external
    criticality: medium
  - repo: mudler/go-pluggable
    kind: external
    criticality: medium
  - repo: mauromorales/xpasswd
    kind: external
    criticality: medium
exclude: []
