# Hybrid repo overrides. Auto-discovery (kairos-io org + kairos-init deps) is the
# base; this file ADDS external repos, EXCLUDES repos, and overrides metadata.
repos:
  - repo: mudler/edgevpn
    kind: external
    branch: master
    criticality: high
    artifacts:
      - type: go
        modpath: .
  - repo: mudler/yip
    kind: external
    branch: master
    criticality: medium
    artifacts:
      - type: go
        modpath: .
  - repo: mudler/entities
    kind: external
    branch: master
    criticality: medium
    artifacts:
      - type: go
        modpath: .
  - repo: mudler/go-pluggable
    kind: external
    branch: master
    criticality: medium
    artifacts:
      - type: go
        modpath: .
  - repo: mauromorales/xpasswd
    kind: external
    branch: master
    criticality: medium
    artifacts:
      - type: go
        modpath: .
exclude: []
