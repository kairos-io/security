# Authoritative, manually-maintained list of repositories to track.
#
# This is the SOURCE OF TRUTH. `ksec discover` reads ONLY this file — it does
# NOT auto-enumerate the GitHub org. Add or remove repos here by hand.
#
# To capture the current org once as a starting point to curate from, run:
#   ksec discover --seed-from kairos-io     # prints a repos: block to stdout
#
# Fields:
#   repo        owner/name (required)
#   kind        org | external          (defaults: kairos-io/* -> org, else external)
#   criticality low | medium | high     (default: medium)
#   branch      optional (informational; clones use the repo's default branch)
#   artifacts   optional, only for container images, e.g.:
#                 artifacts: [{type: image, ref: quay.io/kairos/foo:v1}]
# Go source CVEs (govulncheck) are scanned automatically for any repo that has
# a root go.mod, so Go repos do not need an explicit artifact.
repos:
  # --- kairos-io maintained components ---
  - repo: kairos-io/kairos
    kind: org
    criticality: high
  - repo: kairos-io/kairos-init
    kind: org
    criticality: high
  - repo: kairos-io/kairos-agent
    kind: org
    criticality: high
  - repo: kairos-io/immucore
    kind: org
    criticality: high
  - repo: kairos-io/kcrypt-discovery-challenger
    kind: org
    criticality: medium
  - repo: kairos-io/provider-kairos
    kind: org
    criticality: medium
  - repo: kairos-io/kairos-sdk
    kind: org
    criticality: medium

  # --- external dependencies ---
  - repo: mudler/edgevpn
    kind: external
    criticality: high
  - repo: mudler/yip
    kind: external
    criticality: medium
  - repo: mudler/entities
    kind: external
    criticality: medium
  - repo: mudler/go-pluggable
    kind: external
    criticality: medium
  - repo: mauromorales/xpasswd
    kind: external
    criticality: medium
exclude: []
