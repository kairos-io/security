name: Auto-merge bots PR
on: pull_request

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge-framework:
    runs-on: ubuntu-latest
    if: github.actor == 'github-actions[bot]' || github.actor == 'renovate[bot]' 
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Enable Pull Request Automerge
        run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}"
