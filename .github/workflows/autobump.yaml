name: Update framework images

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 20 * * *'
jobs:
  bump:
    runs-on: kvm
    steps:
    - uses: actions/checkout@v4
    - name: Install earthly
      uses: Luet-lab/luet-install-action@v1.1
      with:
        repository: quay.io/kairos/packages
        packages: utils/earthly
    - name: Run CVE scans
      run: |
        earthly +update-images
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        commit-message: Update dependencies
        title: Update framework images
        body: |
          - Update framework images

          Auto-generated by [create-pull-request][1]

          [1]: https://github.com/peter-evans/create-pull-request
        branch: update-dependencies
    - name: notify if scanning fails
      uses: slackapi/slack-github-action@v1.25.0
      env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      with:
        payload: |
            {
                "blocks": [
                {
                    "type": "section",
                    "text": {
                    "type": "mrkdwn",
                    "text": "New PR ready to sync with the latest framework images in https://github.com/${{ github.repository }}"
                    }
                },
                {
                    "type": "divider"
                },
                {
                    "type": "actions",
                    "elements": [
                    {
                        "type": "button",
                        "text": {
                        "type": "plain_text",
                        "text": "Security reports",
                        "emoji": true
                        },
                        "url": "https://github.com/${{ github.repository }}/pulls"
                    }
                    ]
                }
                ]
            }
