name: CVE Scanning

on:
  push:
    branches:
    - main
#   workflow_call:
#     inputs:
#       flavor:
#         required: true
#         type: string
#       flavor_release:
#         required: true
#         type: string
#       family:
#         required: true
#         type: string
#       release_matcher:
#         required: false
#         type: string

concurrency:
    group: ci-scan-${{ github.head_ref || github.ref }}-${{ github.repository }}
    cancel-in-progress: true
jobs:
  test:
    strategy:
        fail-fast: false
        matrix:
            include:
                - image: quay.io/kairos/framework:v2.4.3_generic

    runs-on: kvm
    steps:
    - uses: actions/checkout@v4
    - run: |
        git fetch --prune --unshallow
    - name: Install earthly
      uses: Luet-lab/luet-install-action@v1.1
      with:
        repository: quay.io/kairos/packages
        packages: utils/earthly
    - name: Run CVE scans
      run: |
        earthly +security-scan --CONTAINER_IMAGE=${{ matrix.image }}

    - name: collect results
      if: failure()
      run: |
        earthly +security-report --CONTAINER_IMAGE=${{ matrix.image }}
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: ${{ matrix.image }}-reports.logs.zip
        path: build/**/
        if-no-files-found: warn

