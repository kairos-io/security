name: Security Dashboard

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print intended writes instead of performing them"
        type: boolean
        default: false
      debug:
        description: "Open an interactive tmate session before running the pipeline"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: security-dashboard
  cancel-in-progress: false

permissions:
  contents: write   # commit state + dashboards back to this repo
  pages: write      # publish the HTML dashboard to GitHub Pages
  id-token: write   # OIDC token required by deploy-pages

jobs:
  dashboard:
    runs-on: oracle-vm-16cpu-64gb-x86-64
    env:
      # Scheduled runs are LIVE by default; dispatch can request dry-run; forks force it.
      DRYRUN: ${{ (github.event.inputs.dry_run == 'true' || github.event.pull_request.head.repo.fork) && '--dry-run' || '' }}
      KSEC_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      # Remediation is LIVE by default (same dry-run rule as the rest of the
      # pipeline: dry-run only on a dispatch dry_run request or a fork PR).
      # NOTE: live remediation needs KSEC_BOT_TOKEN to have contents:write +
      # pull_requests:write on the target repos.
      REMEDIATE_DRYRUN: ${{ (github.event.inputs.dry_run == 'true' || github.event.pull_request.head.repo.fork) && '--dry-run' || '' }}
      # AI-drafted PR descriptions (set to "false" to use deterministic text).
      AI_PR_PROSE: "true"
      # Cross-repo reads + the kairos tracking-issue write use the scoped bot token.
      GH_TOKEN: ${{ secrets.KSEC_BOT_TOKEN }}
      LOCALAI_URL: http://localhost:8080
      # nib reaches the model through an OpenAI-compatible endpoint (LocalAI).
      # NOTE: the exact nib env-var names are the integration point — confirm
      # them against nib's docs and adjust if nib expects different names.
      OPENAI_API_BASE: http://localhost:8080/v1
      OPENAI_API_KEY: sk-localai
      NIB_MODEL: ${{ vars.LOCALAI_MODEL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # Install everything into a workspace-local bin/ on PATH, so we never
      # need root-owned dirs (ARC runners typically run as a non-root user).
      - name: Set up local tools dir
        run: |
          mkdir -p "$GITHUB_WORKSPACE/bin"
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Install scanners
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$GITHUB_WORKSPACE/bin"

      # ARC runners are ephemeral, so cache the downloaded model weights between
      # runs (keyed on ai.yaml, so a model change invalidates the cache).
      - name: Cache LocalAI models
        uses: actions/cache@v4
        with:
          path: models
          key: localai-models-${{ hashFiles('ai.yaml') }}

      # LocalAI runs as a downloaded binary (no Docker — ARC runners have no
      # dind). Best-effort: if it can't start or load the model, triage uses
      # its deterministic fallback, so the pipeline must not fail here.
      - name: Start LocalAI (binary, best-effort)
        continue-on-error: true
        run: |
          set +e
          curl -sfL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o "$GITHUB_WORKSPACE/bin/yq" && chmod +x "$GITHUB_WORKSPACE/bin/yq"
          # LocalAI release assets embed the version: local-ai-<tag>-linux-amd64.
          ver="${LOCALAI_VERSION:-latest}"
          if [ "$ver" = "latest" ]; then
            ver="$(curl -sfL -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/mudler/LocalAI/releases/latest | yq -p=json '.tag_name')"
          fi
          echo "LocalAI version resolved to: '$ver'"
          url="https://github.com/mudler/LocalAI/releases/download/${ver}/local-ai-${ver}-linux-amd64"
          echo "Downloading $url"
          code=$(curl -sL -w '%{http_code}' "$url" -o "$GITHUB_WORKSPACE/bin/local-ai")
          echo "download HTTP status: $code"
          chmod +x "$GITHUB_WORKSPACE/bin/local-ai" 2>/dev/null
          echo "---- binary info ----"
          ls -la "$GITHUB_WORKSPACE/bin/local-ai" 2>/dev/null || echo "binary not present"
          file "$GITHUB_WORKSPACE/bin/local-ai" 2>/dev/null || true
          local-ai --version 2>&1 | head -5 || echo "local-ai --version failed"
          MODEL="${LOCALAI_MODEL:-$(yq '.localai.model.name' ai.yaml)}"
          echo "Starting LocalAI with model: $MODEL"
          local-ai run "$MODEL" --address ":8080" --models-path "$GITHUB_WORKSPACE/models" > localai.log 2>&1 &
          LAI_PID=$!
          # readyz only means the server is up — the model still has to download
          # and load. Wait until a real completion succeeds (or time out, in
          # which case triage falls back). First inference triggers the load, so
          # allow a long per-attempt timeout.
          deadline=$(( SECONDS + 1200 ))   # up to 20 min for download + load
          ready=0
          while [ "$SECONDS" -lt "$deadline" ]; do
            if ! kill -0 "$LAI_PID" 2>/dev/null; then
              echo "local-ai exited early; log tail:"; tail -n 100 localai.log 2>/dev/null; break
            fi
            resp=$(curl -s -m 180 "$LOCALAI_URL/v1/chat/completions" \
              -H 'Content-Type: application/json' \
              -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],\"max_tokens\":1}")
            if printf '%s' "$resp" | grep -q '"choices"'; then ready=1; break; fi
            echo "model not ready yet (~$(( (deadline - SECONDS) / 60 ))m left): $(printf '%s' "$resp" | head -c 200)"
            sleep 15
          done
          if [ "$ready" = 1 ]; then
            echo "LocalAI model '$MODEL' is loaded and answering."
          else
            echo "LocalAI model not ready; triage will use the deterministic fallback."
            echo "---- localai.log (tail) ----"; tail -n 100 localai.log 2>/dev/null || true
          fi

      # nib is the agent that repairs build breaks / conflicts on owned PRs
      # during remediation. It reads its model config from the OPENAI_* / NIB_*
      # env above (LocalAI). Best-effort: if it can't reach the model, remediate
      # records build-failed/needsHuman exactly as without it.
      - name: Install nib
        run: go install github.com/mudler/nib@${NIB_VERSION:-latest}

      - name: Build ksec
        run: go build -o "$GITHUB_WORKSPACE/bin/ksec" ./cmd/ksec

      # Interactive debugging: when dispatched with debug=true, pause here and
      # expose an SSH/web tmate session (restricted to the run's actor). The
      # full toolchain (ksec, local-ai, govulncheck, trivy, nib, yq) is on PATH;
      # localai.log is in the workspace. Disconnect or `touch continue` to resume.
      - name: Debug via tmate
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Run pipeline
        run: |
          ksec discover  --state-dir state
          ksec collect   --state-dir state
          ksec correlate --state-dir state
          ksec triage    --state-dir state --require-ai
          ksec remediate --state-dir state $REMEDIATE_DRYRUN --ai-pr-prose=${AI_PR_PROSE}
          ksec render    --state-dir state $DRYRUN

      - name: Commit state + dashboards
        if: ${{ env.DRYRUN == '' }}
        run: |
          git config user.name "kairos-security-bot"
          git config user.email "bot@kairos.io"
          git add state/ dashboard.md dashboard.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update security dashboard [skip ci]"
            git push
          fi

      - name: Configure Pages
        if: ${{ env.DRYRUN == '' }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ env.DRYRUN == '' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: dashboard
    if: ${{ needs.dashboard.result == 'success' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')) }}
    runs-on: cncf-ubuntu-4-16-x86
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
