name: Security Dashboard

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print intended writes instead of performing them"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: security-dashboard
  cancel-in-progress: false

permissions:
  contents: write   # commit state + dashboards back to this repo
  pages: write      # publish the HTML dashboard to GitHub Pages
  id-token: write   # OIDC token required by deploy-pages

jobs:
  dashboard:
    runs-on: oracle-vm-16cpu-64gb-x86-64
    env:
      # Scheduled runs are LIVE by default; dispatch can request dry-run; forks force it.
      DRYRUN: ${{ (github.event.inputs.dry_run == 'true' || github.event.pull_request.head.repo.fork) && '--dry-run' || '' }}
      KSEC_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      # Cross-repo reads + the kairos tracking-issue write use the scoped bot token.
      GH_TOKEN: ${{ secrets.KSEC_BOT_TOKEN }}
      LOCALAI_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # Install everything into a workspace-local bin/ on PATH, so we never
      # need root-owned dirs (ARC runners typically run as a non-root user).
      - name: Set up local tools dir
        run: |
          mkdir -p "$GITHUB_WORKSPACE/bin"
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Install scanners
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$GITHUB_WORKSPACE/bin"

      - name: Install nib
        run: go install github.com/mudler/nib@${NIB_VERSION:-latest}

      # LocalAI runs as a downloaded binary (no Docker — ARC runners have no
      # dind). Best-effort: if it can't start or load the model, triage uses
      # its deterministic fallback, so the pipeline must not fail here.
      - name: Start LocalAI (binary, best-effort)
        continue-on-error: true
        run: |
          set +e
          curl -sfL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o "$GITHUB_WORKSPACE/bin/yq" && chmod +x "$GITHUB_WORKSPACE/bin/yq"
          ver="${LOCALAI_VERSION:-latest}"
          if [ "$ver" = "latest" ]; then
            url="https://github.com/mudler/LocalAI/releases/latest/download/local-ai-Linux-x86_64"
          else
            url="https://github.com/mudler/LocalAI/releases/download/${ver}/local-ai-Linux-x86_64"
          fi
          curl -sfL "$url" -o "$GITHUB_WORKSPACE/bin/local-ai" && chmod +x "$GITHUB_WORKSPACE/bin/local-ai"
          MODEL="${LOCALAI_MODEL:-$(yq '.localai.model.name' ai.yaml)}"
          echo "Starting LocalAI with model: $MODEL"
          local-ai run "$MODEL" --address ":8080" > localai.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf "$LOCALAI_URL/readyz" >/dev/null 2>&1 && break || sleep 5
          done
          if ! curl -sf "$LOCALAI_URL/readyz" >/dev/null 2>&1; then
            echo "LocalAI not ready after timeout; triage will use the deterministic fallback."
            echo "---- localai.log (tail) ----"; tail -n 50 localai.log 2>/dev/null || true
          fi

      - name: Build ksec
        run: go build -o "$GITHUB_WORKSPACE/bin/ksec" ./cmd/ksec

      - name: Run pipeline
        run: |
          ksec discover  --state-dir state
          ksec collect   --state-dir state
          ksec correlate --state-dir state
          ksec triage    --state-dir state
          ksec render    --state-dir state $DRYRUN

      - name: Commit state + dashboards
        if: ${{ env.DRYRUN == '' }}
        run: |
          git config user.name "kairos-security-bot"
          git config user.email "bot@kairos.io"
          git add state/ dashboard.md dashboard.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update security dashboard [skip ci]"
            git push
          fi

      - name: Configure Pages
        if: ${{ env.DRYRUN == '' }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ env.DRYRUN == '' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: dashboard
    if: ${{ needs.dashboard.result == 'success' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')) }}
    runs-on: cncf-ubuntu-4-16-x86
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
