localai:
  version: "latest"            # overridable: LOCALAI_VERSION
  endpoint: "http://localhost:8080"   # overridable: LOCALAI_URL
  startupTimeout: "5m"
  model:
    name: "gemma-4-e2b-it"     # overridable: LOCALAI_MODEL; confirm exact LocalAI gallery slug
    gallery: "gemma-4-e2b-it"  # gallery entry / model URI to preload
    quant: ""
# AI client settings. Triage calls LocalAI's OpenAI-compatible chat endpoint
# directly (nib was an interactive agent TUI, not a prompt->JSON client).
# Kept under the "nib" key for config compatibility.
nib:
  model: ""                    # defaults to localai.model.name
  endpoint: ""                 # defaults to localai.endpoint
  maxTokens: 4096
  temperature: 0.2
