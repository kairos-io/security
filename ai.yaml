localai:
  version: "latest"            # overridable: LOCALAI_VERSION
  endpoint: "http://localhost:8080"   # overridable: LOCALAI_URL
  startupTimeout: "5m"
  model:
    name: "gemma-4-e2b-it"     # overridable: LOCALAI_MODEL; confirm exact LocalAI gallery slug
    gallery: "gemma-4-e2b-it"  # gallery entry / model URI to preload
    quant: ""
# AI client settings. Triage calls LocalAI's OpenAI-compatible chat endpoint
# directly (nib was an interactive agent TUI, not a prompt->JSON client).
# Kept under the "nib" key for config compatibility.
nib:
  model: ""                    # defaults to localai.model.name
  endpoint: ""                 # defaults to localai.endpoint
  maxTokens: 4096
  temperature: 0.2
# AI review of bot-authored PRs: scans each open bot PR's diff and posts a
# verdict (good / bad / needs_human_verification). Idempotent on the PR head SHA.
review:
  enabled: true
  autoApprove: false           # when true, a "good" verdict runs `gh pr review --approve` (never merges)
  maxPerRun: 20                # cap NEW assessments/comments per run
  notify: []                   # @handles/teams cc'd in the verdict comment, e.g. ["@kairos-io/maintainers"]
# AI applicability classifier: during correlate, feeds each actionable finding's
# upstream CVE Details + affected ranges to the model and attaches an advisory
# ⚠️ warning + reasoning when the model confidently rules a finding out.
# Fail-visible: the finding stays counted and actionable; the AI verdict is
# advisory metadata only. Any transport/model error or low-confidence verdict
# leaves the finding unannotated — a flaky model can't silently hide real vulns.
applicability:
  enabled: true                # on by default; --no-ai-applicability skips it per run
  endpoint: ""                 # defaults to localai.endpoint
  model: ""                    # defaults to localai.model.name
  temperature: 0.1
  maxTokens: 1024
  confidenceThreshold: "high"  # "high" (default) | "medium"; verdict below this bar leaves the finding unannotated
